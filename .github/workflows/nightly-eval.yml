# Nightly Eval Baseline — scheduled regression baseline for the fleet (REPORT-ONLY).
#
# Closes roadmap item #3 (Smarter/Cheaper safety net): with Model Router auto-routing to cheaper models
# and a steady stream of prompt/skill changes (compute-allocator, critic-pass, semantic-trust), we need a
# scheduled check that quality still clears the bar. This runs the agent-evals golden-task suite nightly
# (LLM-as-judge on Azure credits — credit-funded, cost-neutral), emits eval_result to PostHog (the durable
# trend IS the regression baseline), uploads the scorecard artifact, and posts a Step Summary with a
# report-only FLOOR guard. It NEVER blocks anything: run-evals.mjs exits 1 whenever any single task fails
# (normal signal), so the run step tolerates that; the baseline is a human-facing signal, not a gate.
#
# Mirrors otchealth-mcp-server's nightly-medic.yml cron pattern. Needs GCP_CLAUDE_DRIVER_SA_JSON (the same
# claude-driver SA secret promptcheck.yml uses to reach Azure OpenAI + PostHog via Secret Manager).
name: Nightly Eval Baseline

on:
  schedule:
    - cron: '30 6 * * *'   # daily 06:30 UTC (ahead of the 08:00 Nightly Fleet Medic)
  workflow_dispatch: {}     # manual trigger for testing

permissions:
  contents: read

concurrency:
  group: nightly-eval
  cancel-in-progress: false

jobs:
  eval:
    name: golden-task baseline (report-only)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Run golden-task suite (judge on Azure credits) + emit to PostHog
        id: run
        # run-evals.mjs exits 1 if ANY task fails; that is a baseline SIGNAL, not a workflow failure.
        continue-on-error: true
        working-directory: skills/agent-evals
        env:
          GCP_CLAUDE_DRIVER_SA_JSON: ${{ secrets.GCP_CLAUDE_DRIVER_SA_JSON }}
        run: |
          node run-evals.mjs --emit --json "${GITHUB_WORKSPACE}/nightly-scorecard.json" 2>&1 | tee "${GITHUB_WORKSPACE}/nightly-eval.log"

      - name: Baseline summary + floor guard (report-only)
        if: always()
        env:
          EVAL_FLOOR: '0.6'
        run: node skills/agent-evals/nightly-summary.mjs "${GITHUB_WORKSPACE}/nightly-scorecard.json"

      # CI EVAL-GATE (report-only phase; see skills/agent-evals/eval-gate.mjs header). Compares
      # tonight's scorecard against the last recorded baseline.json (repo-tracked, seeded at total=0
      # so this is a no-op until a real baseline exists). NEVER blocks the nightly (no --enforce);
      # this exercises the exact code path a future deploy-time gate (see deploy-eval-gate.yml) would
      # invoke, so its output/format is battle-tested before anything depends on it for real.
      - name: Eval-gate vs last baseline (report-only; --enforce is the future deploy-gate mode)
        if: always()
        run: node skills/agent-evals/eval-gate.mjs "${GITHUB_WORKSPACE}/nightly-scorecard.json" --baseline skills/agent-evals/baseline.json --tolerance 0.05

      - name: Upload scorecard + run log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nightly-eval-scorecard
          path: |
            nightly-scorecard.json
            nightly-eval.log
          retention-days: 90
          if-no-files-found: warn
