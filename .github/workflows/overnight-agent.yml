# Overnight / unattended AGENT runner — the Tier-2 reference (Fleet Intelligence #4/#5).
# Runs Claude Code HEADLESS on the Claude Max 20x SUBSCRIPTION (zero metered API spend), on a schedule
# or on demand. See runbooks/overnight-autonomy.md (otchealth-cto) for the full standard.
#
# ONE setup step (Matt, once): `claude setup-token` -> paste the one-year token -> store it as the
#   CLAUDE_CODE_OAUTH_TOKEN secret (repo or org). Until that secret exists this workflow is a no-op.
# It is dispatch-only by default; uncomment the schedule to arm the nightly run.
name: Overnight Agent

on:
  workflow_dispatch:
    inputs:
      task:
        description: "The task prompt for the headless agent"
        required: true
        default: "Summarize what changed in this repo in the last 24h and open a draft PR with a short report."
  schedule:
    - cron: "0 9 * * *"   # 09:00 UTC ~= 02:00 PT. ARMED (CLAUDE_CODE_OAUTH_TOKEN is set 2026-06-22).

permissions:
  contents: write
  pull-requests: write

jobs:
  agent:
    runs-on: ubuntu-latest
    env:
      # The Max-plan OAuth token (from `claude setup-token`). Subscription auth, NOT a metered key.
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Guard — require the subscription token (never fall back to metered API)
        run: |
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN}" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN is not set. Run 'claude setup-token' and add the secret. Refusing to run (would otherwise risk metered API spend)."
            exit 1
          fi

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run the agent task (subscription auth, zero metered spend)
        env:
          # Pass the task through an env var (never interpolate ${{ }} directly into the shell = injection-safe).
          # On a `schedule` trigger there are no inputs, so fall back to the default standing task.
          TASK: ${{ github.event.inputs.task || 'Summarize what changed in this repo in the last 24h and open a draft PR with a short report.' }}
        run: |
          # ANTHROPIC_API_KEY takes precedence over the OAuth token; ensure it is unset so we stay on the Max plan.
          unset ANTHROPIC_API_KEY
          # Safety rails for the unattended run (this repo is non-PHI; main is push-protected).
          RAILS='Operating rules: work only on a claude/* branch and open DRAFT PRs; never push to main; never touch PHI (MedReview/FourVault) or INND/HearingAssist securities or financial data; if you hit a hard gate (payment, KYC, account signup, OAuth consent) stop and leave a note instead. '
          claude -p "${RAILS}${TASK}" \
            --permission-mode acceptEdits \
            --output-format json | tee result.json

      # SAFETY NET: persist whatever the agent left even if it never ran git itself, so an unattended
      # overnight run can never silently discard its work. Captures uncommitted changes (and local
      # commits) onto a claude/* branch and opens a DRAFT PR. NEVER pushes to the default branch.
      - name: Persist agent work to a draft PR (safety net)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.run_id }}
          DEFAULT_BRANCH: ${{ github.ref_name }}
          TASK: ${{ github.event.inputs.task || 'Summarize what changed in this repo in the last 24h and open a draft PR with a short report.' }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin --quiet || true

          DIRTY=0; [ -n "$(git status --porcelain)" ] && DIRTY=1
          AHEAD=$(git rev-list --count "origin/${DEFAULT_BRANCH}..HEAD" 2>/dev/null || echo 0)
          if [ "$DIRTY" = "0" ] && [ "$AHEAD" = "0" ]; then
            echo "No agent work to persist (clean working tree, no new commits)."; exit 0
          fi

          PUSHED_ELSEWHERE=$(git branch -r --contains HEAD 2>/dev/null | sed 's/^[ *]*//' \
            | grep '^origin/' | grep -v "^origin/${DEFAULT_BRANCH}$" | head -1 || true)
          if [ "$DIRTY" = "0" ] && [ -n "$PUSHED_ELSEWHERE" ]; then
            echo "Agent already pushed HEAD to ${PUSHED_ELSEWHERE}; safety net not needed."; exit 0
          fi

          BRANCH="claude/overnight-${RUN_ID}"
          git checkout -B "$BRANCH"
          if [ "$DIRTY" = "1" ]; then
            git add -A
            git commit -m "overnight run ${RUN_ID}: capture agent work" \
              -m "Auto-captured at the end of the overnight run so nothing is lost. Task: ${TASK}"
          fi
          git push -u origin "$BRANCH"

          if gh pr view "$BRANCH" >/dev/null 2>&1; then
            echo "Draft PR already exists for ${BRANCH}."
          else
            gh pr create --draft --base "$DEFAULT_BRANCH" --head "$BRANCH" \
              --title "Overnight run ${RUN_ID}: $(printf '%s' "$TASK" | head -c 60)" \
              --body "Automated draft PR capturing the work of overnight run [\`${RUN_ID}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}).

          **Task:** ${TASK}

          Unattended subscription-auth run. Review before merge." || echo "PR create skipped (may already exist)."
          fi

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: overnight-agent-result
          path: result.json
