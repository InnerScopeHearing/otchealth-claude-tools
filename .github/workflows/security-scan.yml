name: security-scan

# Secret-scanning gate (supply-chain-guard). Runs on PRs and pushes to main.
#   - gitleaks  : secret patterns across full git history (MIT CLI, pinned version).
#   - trufflehog: verified live credentials only (filesystem mode).
# GitHub Actions are SHA-pinned per the supply-chain hardening policy.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Gitleaks (secret patterns, full history)
        run: |
          set -euo pipefail
          VER=8.28.0
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" -o gitleaks.tgz
          tar -xzf gitleaks.tgz gitleaks
          ./gitleaks detect --no-banner --redact --source . --verbose

      - name: TruffleHog (verified live credentials)
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51 # v3.95.5
        with:
          path: ./
          extra_args: --only-verified
