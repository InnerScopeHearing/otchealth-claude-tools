# Auto critic-pass on autonomous / draft PRs — REPORT-ONLY (never blocks merge).
#
# Closes the loop opened by compute-allocator's useCritic and skills/critic-pass/run.mjs: a spawned
# autonomous-run session (autonomous-run.yml) opens DRAFT PRs from claude/* branches but is deliberately
# LEAST-PRIVILEGE (only CLAUDE_CODE_OAUTH_TOKEN + the repo GITHUB_TOKEN, NO Secret Manager), so it cannot
# run the real critic model call itself. This workflow runs that critic HERE, on the credentialed
# ubuntu-latest CI runner (the same GCP_CLAUDE_DRIVER_SA_JSON secret promptcheck.yml uses), automatically
# on the draft PR BEFORE a human finalizes (marks ready / merges) it. The unattended agent gains no new
# powers; the model call lives where creds already legitimately live.
#
# Scope (job-level `if`): only DRAFT PRs, or PRs from claude/* branches (the autonomous runner's + the
# fleet-dispatch --spawn safety-net branches). A normal non-draft feature PR triggers the workflow but
# the single job is SKIPPED, so there is zero model spend on ordinary PRs.
#
# Posture: continue-on-error at the job AND every step (phase-1, matching promptcheck.yml). It is never a
# required status check and never blocks a merge; it posts a sticky PR comment with the verdict. run.mjs
# is itself fail-safe (a broken critic approves), so the worst case is a "could not run" note.
name: critic-pr

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: critic-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-critic:
    name: auto critic pass (report-only)
    # Only autonomous / draft PRs. Ordinary non-draft PRs skip this job entirely (no model spend).
    if: github.event.pull_request.draft == true || startsWith(github.head_ref, 'claude/')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - name: Checkout PR head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Gather the PR diff + goal (injection-safe via env + files, never interpolated)
        continue-on-error: true
        env:
          # All GitHub-computed values; passed via env and written to files with printf '%s', never
          # interpolated into the shell or the critic command line (workflow-injection-safe pattern).
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -e
          # three-dot diff = changes on the PR head since it forked from base (merge-base), bounded so a
          # huge PR never blows the critic model's context. ~80k chars leaves room for the critic prompt.
          git diff --no-color "${BASE_SHA}...${HEAD_SHA}" > /tmp/diff.full.txt 2>/dev/null \
            || git diff --no-color "${BASE_SHA}" "${HEAD_SHA}" > /tmp/diff.full.txt
          head -c 80000 /tmp/diff.full.txt > /tmp/diff.txt
          [ -s /tmp/diff.txt ] || printf '(no file changes detected in this PR)' > /tmp/diff.txt
          printf '%s' "${PR_TITLE}" > /tmp/task.txt
          printf '%s' "${PR_BODY}"  > /tmp/context.txt
          echo "diff bytes: $(wc -c < /tmp/diff.txt)"

      - name: Run the real critic pass on the diff (credentialed runner)
        continue-on-error: true
        env:
          # Same claude-driver SA secret promptcheck.yml uses; run.mjs's sm() resolves azure-openai-* from
          # Secret Manager with it. This secret lives ONLY on this CI runner, never on the autonomous runner.
          GCP_CLAUDE_DRIVER_SA_JSON: ${{ secrets.GCP_CLAUDE_DRIVER_SA_JSON }}
        run: |
          node skills/critic-pass/run.mjs \
            --task-file /tmp/task.txt \
            --draft-file /tmp/diff.txt \
            --context-file /tmp/context.txt \
            --min-severity medium > /tmp/verdict.json \
          || printf '{"ran":true,"verdict":"approve","malformed":true,"shouldRevise":false,"error":"critic step could not run"}' > /tmp/verdict.json
          cat /tmp/verdict.json

      - name: Post (or update) the critic verdict PR comment
        if: always()
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            let v = {};
            try { v = JSON.parse(fs.readFileSync('/tmp/verdict.json', 'utf8')); } catch { v = { ran: true, verdict: 'approve', malformed: true, error: 'no verdict produced' }; }
            const marker = '<!-- critic-pass-gate -->';
            const lines = [marker, '### 🧪 Auto critic pass (report-only)', ''];
            if (v.ran === false) {
              lines.push(`Skipped: \`${v.skipped || 'not run'}\` — the allocator did not flag this as needing a critic pass.`);
            } else if (v.malformed) {
              lines.push(`⚠️ The critic could not run cleanly (fail-safe **approve**). ${v.error ? '`' + v.error + '`' : ''}`.trim());
              lines.push('', 'A broken critic never blocks — this is informational only.');
            } else {
              const badge = v.verdict === 'revise' ? '🔴 **REVISE**' : '🟢 **APPROVE**';
              lines.push(`**Verdict:** ${badge}  ·  model \`${v.model || 'n/a'}\`  ·  confidence ${typeof v.confidence === 'number' ? v.confidence.toFixed(2) : 'n/a'}  ·  shouldRevise: \`${!!v.shouldRevise}\``);
              const issues = Array.isArray(v.issues) ? v.issues : [];
              if (issues.length) {
                lines.push('', '**Issues found:**');
                for (const it of issues) lines.push(`- \`${it.severity}\` — ${it.note}`);
              } else {
                lines.push('', 'No material issues found.');
              }
              if (v.shouldRevise) lines.push('', '➡️ Address the medium+ issue(s) above and re-push **before marking this PR ready**.');
            }
            lines.push('', '<sub>Report-only, never blocks merge. Auto-runs on draft / `claude/*` PRs via `.github/workflows/critic-pr.yml`.</sub>');
            const body = lines.join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.data.find((c) => c.body && c.body.includes(marker));
            if (existing) await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            else await github.rest.issues.createComment({ owner, repo, issue_number, body });
